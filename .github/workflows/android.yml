name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download hiddify-core prebuilt AAR
        run: |
          mkdir -p android/app/libs
          curl -L -o hiddify-core.tar.gz https://github.com/hiddify/hiddify-core/releases/download/v4.1.0/hiddify-lib-android.tar.gz
          tar -xzf hiddify-core.tar.gz -C android/app/libs
          ls -la android/app/libs/

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android APK (universal)
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p out
          cp build/app/outputs/flutter-apk/app-release.apk out/LabsVpn.apk
          ls -la out/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LabsVpn-Android
          path: out/LabsVpn.apk
          retention-days: 30
